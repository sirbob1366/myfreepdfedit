<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)" />

<title>Your account — MyFreePDFEdit</title>
<meta name="description" content="Manage your MyFreePDFEdit account." />
<meta name="robots" content="noindex" />
<link rel="canonical" href="https://myfreepdfedit.com/account/" />

<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="/" class="brand" aria-label="MyFreePDFEdit home">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="4" y="3" width="20" height="26" rx="3" fill="currentColor" opacity="0.12"/>
        <rect x="4" y="3" width="20" height="26" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9 12h10M9 16h10M9 20h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-text">MyFreePDFEdit</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/#tools">Tools</a>
      <a href="/editor/">Editor</a>
      <a href="/#faq">FAQ</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" type="button">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></g></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z" fill="currentColor"/></svg>
      </button>
    </nav>
  </div>
</header>

<main class="legal">
  <div class="container">
    <div class="legal-head">
      <h1>Your account</h1>
    </div>

    <div id="account-body" class="prose">
      <p id="account-loading">Loading…</p>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container footer-bottom" style="border-top: none;">
    <small>© <span id="year"></span> MyFreePDFEdit — <a href="/" style="color: var(--accent);">Back to all tools</a></small>
  </div>
</footer>

<script src="/app.js" defer></script>
<script>
(function () {
  function render(user) {
    const body = document.getElementById('account-body');
    if (!body) return;
    if (!window.SUPABASE_CONFIGURED) {
      body.innerHTML = '<p>Accounts aren’t available yet. Please check back soon.</p>';
      return;
    }
    if (!user) {
      body.innerHTML = `
        <p>You’re not signed in.</p>
        <button class="btn btn-primary" id="account-signin" type="button">Sign in</button>`;
      const b = document.getElementById('account-signin');
      if (b) b.onclick = () => window.Auth && window.Auth.openModal();
      return;
    }
    const m = user.user_metadata || {};
    const name = m.full_name || m.name || m.user_name || (user.email || 'Account');
    const avatar = m.avatar_url;
    const provider = (user.app_metadata && user.app_metadata.provider) || '—';
    body.innerHTML = `
      <div class="account-card">
        ${avatar ? `<img class="account-avatar" src="${avatar}" alt="" referrerpolicy="no-referrer" />`
                 : `<div class="account-avatar account-avatar-fallback">${(name[0]||'?').toUpperCase()}</div>`}
        <div>
          <div class="account-name">${name}</div>
          <div class="account-email">${user.email || ''}</div>
          <div class="account-provider">Signed in with ${provider}</div>
        </div>
      </div>
      <h2>Your privacy</h2>
      <p>Your PDFs are processed entirely on your device and are never uploaded or stored on our servers. Your account only holds your sign-in profile and preferences.</p>
      <button class="btn btn-ghost" id="account-signout" type="button">Sign out</button>`;
    const so = document.getElementById('account-signout');
    if (so) so.onclick = () => window.Auth && window.Auth.signOut();
  }

  // auth.js dispatches these once the session is known.
  document.addEventListener('auth:ready', e => render(e.detail.user));
  document.addEventListener('auth:change', e => render(e.detail.user));

  // If accounts are not configured, auth.js never loads — resolve after a beat.
  setTimeout(() => {
    if (!window.SUPABASE_CONFIGURED) render(null);
    else if (!window.Auth) render(null);
  }, 1500);
})();
</script>
</body>
</html>
