<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Exploded engineering diagram of a PDF document: base sheet, form fields, image and text layers">
  <defs>
    <g id="sheet">
      <polygon points="0,78 190,0 380,78 190,156" fill="#ffffff" stroke="#16161c" stroke-width="1.4"/>
      <polygon points="0,78 190,156 190,168 0,90" fill="#ececea" stroke="#16161c" stroke-width="1"/>
      <polygon points="380,78 190,156 190,168 380,90" fill="#f4f4f2" stroke="#16161c" stroke-width="1"/>
    </g>
  </defs>

  <!-- vertical exploded axis -->
  <line x1="250" y1="36" x2="250" y2="514" stroke="#e8362d" stroke-width="1" stroke-dasharray="2 5" opacity="0.7"/>

  <!-- TEXT LAYER (top) -->
  <g transform="translate(60,30)">
    <use href="#sheet"/>
    <g stroke="#16161c" stroke-width="1.6" opacity="0.55">
      <line x1="80" y1="62" x2="240" y2="-4"  transform="translate(30,30)"/>
      <line x1="80" y1="74" x2="220" y2="16"  transform="translate(30,30)"/>
      <line x1="80" y1="86" x2="248" y2="17"  transform="translate(30,30)"/>
    </g>
  </g>
  <line x1="402" y1="80" x2="520" y2="56" stroke="#16161c" stroke-width="1"/>
  <circle cx="402" cy="80" r="2.4" fill="#e8362d"/>
  <text x="528" y="60" font-size="11" letter-spacing="1.5" fill="#16161c">TEXT LAYER</text>

  <!-- IMAGE LAYER -->
  <g transform="translate(60,150)">
    <use href="#sheet"/>
    <polygon points="120,64 200,30 270,60 190,96" fill="none" stroke="#e8362d" stroke-width="1.4"/>
    <circle cx="172" cy="56" r="5" fill="none" stroke="#e8362d" stroke-width="1.4"/>
  </g>
  <line x1="402" y1="206" x2="520" y2="186" stroke="#16161c" stroke-width="1"/>
  <circle cx="402" cy="206" r="2.4" fill="#e8362d"/>
  <text x="528" y="190" font-size="11" letter-spacing="1.5" fill="#16161c">IMAGE PLANE</text>

  <!-- FORM FIELDS -->
  <g transform="translate(60,270)">
    <use href="#sheet"/>
    <g fill="none" stroke="#16161c" stroke-width="1.2" opacity="0.75">
      <polygon points="110,66 190,33 232,51 152,84"/>
      <polygon points="160,90 240,57 282,75 202,108"/>
    </g>
    <polygon points="246,46 262,39 270,43 254,50" fill="#e8362d" opacity="0.85"/>
  </g>
  <line x1="402" y1="330" x2="520" y2="312" stroke="#16161c" stroke-width="1"/>
  <circle cx="402" cy="330" r="2.4" fill="#e8362d"/>
  <text x="528" y="316" font-size="11" letter-spacing="1.5" fill="#16161c">FORM FIELDS</text>

  <!-- BASE SHEET with bookmark -->
  <g transform="translate(60,392)">
    <use href="#sheet"/>
    <polygon points="262,28 302,12 302,30 262,46" fill="#e8362d"/>
    <text x="268" y="34" font-size="10" letter-spacing="1" fill="#ffffff" transform="rotate(-22 268 34)">PDF</text>
  </g>
  <line x1="402" y1="452" x2="520" y2="436" stroke="#16161c" stroke-width="1"/>
  <circle cx="402" cy="452" r="2.4" fill="#e8362d"/>
  <text x="528" y="440" font-size="11" letter-spacing="1.5" fill="#16161c">BASE SHEET</text>

  <!-- explode connector dashes between layers -->
  <g stroke="#16161c" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.45">
    <line x1="120" y1="125" x2="120" y2="240"/>
    <line x1="380" y1="125" x2="380" y2="240"/>
    <line x1="120" y1="245" x2="120" y2="360"/>
    <line x1="380" y1="245" x2="380" y2="360"/>
    <line x1="120" y1="365" x2="120" y2="482"/>
    <line x1="380" y1="365" x2="380" y2="482"/>
  </g>

  <!-- drawing-sheet frame marks -->
  <g fill="#16161c" font-size="10" letter-spacing="1.5" opacity="0.8">
    <text x="8" y="18">FIG. 01 — PORTABLE DOCUMENT, EXPLODED VIEW</text>
    <text x="8" y="548">SCALE 1:1 · PROCESSED ON-DEVICE</text>
    <text x="640" y="548" fill="#e8362d">SHT 01 / 05</text>
  </g>
  <g stroke="#16161c" stroke-width="1.2">
    <path d="M2 30 V2 H30" fill="none"/>
    <path d="M758 30 V2 H730" fill="none"/>
    <path d="M2 530 V558 H30" fill="none"/>
    <path d="M758 530 V558 H730" fill="none"/>
  </g>
</svg>
